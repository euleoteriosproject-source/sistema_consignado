name: Backend CI

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: consignado_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        working-directory: backend
        run: ./gradlew build -x test

      - name: Run tests
        working-directory: backend
        env:
          SUPABASE_DB_URL: jdbc:postgresql://localhost:5432/consignado_test
          SUPABASE_DB_USER: postgres
          SUPABASE_DB_PASSWORD: postgres
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          SUPABASE_JWT_SECRET: test-jwt-secret-with-minimum-32-characters-required
          SUPABASE_STORAGE_BUCKET: test-bucket
          UPSTASH_REDIS_URL: redis://localhost:6379
          FRONTEND_URL: http://localhost:3000
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake
        run: ./gradlew test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: backend/build/reports/tests/

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build JAR
        working-directory: backend
        run: ./gradlew bootJar -x test

      - name: Build Docker image
        working-directory: backend
        run: docker build -t consignado-api:${{ github.sha }} .
