spring:
  application:
    name: consignado-api

  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      url: ${UPSTASH_REDIS_URL}
      ssl:
        enabled: true

  cache:
    type: redis
    redis:
      time-to-live: 300000

  threads:
    virtual:
      enabled: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  supabase:
    url: ${SUPABASE_URL}
    anon-key: ${SUPABASE_ANON_KEY}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    jwt-secret: ${SUPABASE_JWT_SECRET}
    storage-bucket: ${SUPABASE_STORAGE_BUCKET:consignado-storage}
  jwt:
    secret: ${SUPABASE_JWT_SECRET}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_fake}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_fake}
  kiwify:
    webhook-token: ${KIWIFY_WEBHOOK_TOKEN:changeme}
  resend:
    api-key: ${RESEND_API_KEY:disabled}
    from-email: ${RESEND_FROM_EMAIL:suporte@seudominio.com.br}
    support-email: ${SUPPORT_EMAIL:vinicius.euleoterio@hotmail.com}
  admin:
    email: ${ADMIN_EMAIL:euleoteriosproject@gmail.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.consignado: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
